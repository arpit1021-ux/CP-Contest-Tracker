<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CP Contest Tracker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <h1>CP Contest Tracker</h1>
      </div>
      <button id="settings-btn" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <div id="status-bar" class="hidden">
      <span id="status-text"></span>
    </div>

    <div id="loading" class="state">
      <div class="spinner"></div>
      <p>Loading contests...</p>
    </div>

    <div id="error" class="state hidden">
      <p class="error-icon">!</p>
      <p>Failed to load contests</p>
      <p class="error-sub" id="error-msg"></p>
      <button id="retry-btn">Retry</button>
    </div>

    <div id="empty" class="state hidden">
      <p>No upcoming contests</p>
      <p class="empty-sub">Check your platform filters in settings</p>
    </div>

    <div id="contest-list" class="hidden"></div>

    <div id="settings-panel" class="hidden">
      <div class="settings-header">
        <button id="back-btn" title="Back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <h2>Settings</h2>
      </div>

      <div class="settings-section">
        <h3>Platforms</h3>
        <div id="platform-toggles"></div>
      </div>

      <div class="settings-section">
        <h3>Reminder Before Contest</h3>
        <select id="reminder-select">
          <option value="5">5 minutes</option>
          <option value="15">15 minutes</option>
          <option value="30">30 minutes</option>
          <option value="60">60 minutes</option>
        </select>
      </div>

      <div class="settings-footer">
        <p>Built by <strong>Arpit Singh</strong></p>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
